              cooperative — willing to defer consumption or share surplus when it helps 
              the community avoid penalties."
  
  H8:
    csv: houseteh8_1day
    panel_area_m2: 8
    battery_capacity_kwh: 15.0
    persona: "Large household with the biggest solar array of the three. High consumption 
              from many appliances and occupants. Despite having more panels than neighbors, 
              PV alone does not cover demand. Strategic and self-interested — optimizes own 
              outcome first, cooperates only when clearly beneficial."

